<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Staff</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { api } from '/js/api.js'
    import { checkAuth } from '/js/auth.js'
    import { renderAppShell } from '/js/layout.js'

    const _token = localStorage.getItem('token')
    const _user = JSON.parse(localStorage.getItem('user') || '{}')
    if (!_token) window.location.href = '/pages/login.html'

    const user = checkAuth()
    if (!user) throw new Error('auth required')
    if (user.role === 'admin') window.location.href = '/pages/dashboard-admin.html'

    const page = renderAppShell({ title: 'Dashboard', activeKey: 'dashboard' })
    page.innerHTML = `
      <div id="error"></div>
      <div id="loading">Loading...</div>
      <section class="grid-3" id="kpis" style="display:none;"></section>
      <section class="grid-3" id="ops" style="display:none; margin-top:12px;"></section>
      <section class="card" id="quick-stock" style="display:none;"><h3>Stock Quick View</h3><table><thead><tr><th>Product</th><th>Qty</th><th>Reorder Level</th></tr></thead><tbody id="quick-stock-body"></tbody></table></section>
      <section class="card" id="recent" style="display:none;"><h3>Recent Movements</h3><table><thead><tr><th>Product</th><th>Type</th><th>Qty</th><th>Date</th></tr></thead><tbody id="recent-body"></tbody></table></section>
    `

    const errorBox = document.getElementById('error')
    const loading = document.getElementById('loading')

    function showError(message) {
      errorBox.style.display = 'block'
      errorBox.textContent = message || 'Failed to load data. Please try again.'
    }

    function statusCount(items) {
      const map = { DRAFT: 0, WAITING: 0, READY: 0, DONE: 0 }
      for (const row of items || []) {
        if (map[row.status] != null) map[row.status] += 1
      }
      return map
    }

    try {
      const today = new Date()
      const day = today.toISOString().slice(0, 10)

      const [dash, receipts, deliveries, transfers, moves, inventory] = await Promise.all([
        api.getDashboard(),
        api.getReceipts(),
        api.getDeliveries(),
        api.getTransfers(),
        api.getMoves({ from: day, to: day }),
        api.getInventory()
      ])

      loading.style.display = 'none'
      if (!dash?.success) {
        showError(dash?.message)
        throw new Error('dashboard load failed')
      }

      const pendingTasks = (dash.data.pendingReceipts || 0) + (dash.data.pendingDeliveries || 0)
      const kpis = document.getElementById('kpis')
      kpis.innerHTML = `
        <article class="kpi-card kpi-teal"><div>My Pending Tasks</div><h2>${pendingTasks}</h2></article>
        <article class="kpi-card kpi-amber"><div>Low Stock Alerts</div><h2>${dash.data.lowStock || 0}</h2></article>
        <article class="kpi-card kpi-blue"><div>Today's Movements</div><h2>${moves?.total || 0}</h2></article>
      `
      kpis.style.display = 'grid'

      const receiptStats = statusCount(receipts?.data || [])
      const deliveryStats = statusCount(deliveries?.data || [])
      const transferStats = statusCount(transfers?.data || [])

      const ops = document.getElementById('ops')
      ops.innerHTML = `
        <article class="card summary-card"><h3>Receipts</h3><p>Draft ${receiptStats.DRAFT} · Waiting ${receiptStats.WAITING} · Ready ${receiptStats.READY} · Done ${receiptStats.DONE}</p><button onclick="location.href='/pages/receipts.html'">${receipts?.total || 0} to Receive</button></article>
        <article class="card summary-card teal"><h3>Deliveries</h3><p>Draft ${deliveryStats.DRAFT} · Waiting ${deliveryStats.WAITING} · Ready ${deliveryStats.READY} · Done ${deliveryStats.DONE}</p><button onclick="location.href='/pages/deliveries.html'">${deliveries?.total || 0} to Deliver</button></article>
        <article class="card summary-card blue"><h3>Transfers</h3><p>Draft ${transferStats.DRAFT} · Waiting ${transferStats.WAITING} · Ready ${transferStats.READY} · Done ${transferStats.DONE}</p><button onclick="location.href='/pages/move-history.html?type=TRANSFER'">${transfers?.total || 0} Transfers</button></article>
      `
      ops.style.display = 'grid'

      const low = (inventory?.data || [])
        .filter((row) => Number(row.quantity) <= Number(row.reorder_level))
        .slice(0, 5)
      const quickBody = document.getElementById('quick-stock-body')
      quickBody.innerHTML = ''
      low.forEach((row) => {
        const tr = document.createElement('tr')
        tr.style.background = '#fef3c7'
        tr.innerHTML = `<td>${row.product_name}</td><td>${row.quantity}</td><td>${row.reorder_level}</td>`
        quickBody.appendChild(tr)
      })
      document.getElementById('quick-stock').style.display = 'block'

      const recentBody = document.getElementById('recent-body')
      recentBody.innerHTML = ''
      ;(moves?.data || []).slice(0, 5).forEach((row) => {
        const tr = document.createElement('tr')
        tr.innerHTML = `<td>${row.product_name || '-'}</td><td><span class="badge status-${row.movement_type}">${row.movement_type}</span></td><td>${row.quantity}</td><td>${row.created_at ? new Date(row.created_at).toLocaleString() : '-'}</td>`
        recentBody.appendChild(tr)
      })
      document.getElementById('recent').style.display = 'block'
    } catch (err) {
      loading.style.display = 'none'
      showError(err.message || 'Failed to load. Check your connection.')
    }
  </script>
</body>
</html>
