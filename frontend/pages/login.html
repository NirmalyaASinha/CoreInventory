<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoreInventory Login</title>
  <link rel="stylesheet" href="/css/app.css" />
  <style>
    .card {
      max-width: 480px;
      padding: 48px;
      border-top: 4px solid #14b8a6;
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #14b8a6;
      display: inline-block;
      flex: 0 0 auto;
    }

    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 28px 0;
    }

    .msg-success {
      background: #dcfce7;
      color: #166534;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .msg-error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .forgot-title {
      font-size: 16px;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 16px;
    }

    #otp-section {
      display: none;
    }

    #otp-section.visible {
      display: block;
    }
  </style>
</head>
<body class="login-page">
  <section class="login-card card">
    <h1 class="login-brand"><span class="brand-dot"></span><span>CoreInventory</span></h1>
    <p class="muted">Inventory access portal</p>

    <form id="login-form" class="inline" style="margin-top:12px;">
      <input id="email" type="email" placeholder="Email" required style="flex:1; min-width:100%;" />
      <input id="password" type="password" placeholder="Password" required style="flex:1; min-width:100%;" />
      <button type="submit" style="width:100%;">Login</button>
    </form>
    <p id="login-error" class="text-danger" style="margin-top:10px;"></p>

    <hr class="divider" />

    <h3 class="forgot-title">Forgot Password</h3>
    <form id="otp-send-form" class="inline">
      <input id="otp-email" type="email" placeholder="Registered email" required style="flex:1; min-width:100%;" />
      <button type="submit" style="width:100%;">Send OTP</button>
    </form>

    <div id="otp-section">
      <form id="otp-verify-form" class="inline" style="margin-top:8px;">
        <input id="otp-code" placeholder="6 digit OTP" required style="flex:1; min-width:100%;" />
        <button type="submit" style="width:100%;">Verify OTP</button>
      </form>
    </div>
    <p id="otp-message" class="muted" style="margin-top:10px;"></p>
  </section>

  <script type="module">
    import { api } from '/js/api.js'
    import { redirectToRoleDashboard } from '/js/auth.js'

    const loginForm = document.getElementById('login-form')
    const loginError = document.getElementById('login-error')
    const otpSendForm = document.getElementById('otp-send-form')
    const otpVerifyForm = document.getElementById('otp-verify-form')
    const otpMessage = document.getElementById('otp-message')
    const otpSection = document.getElementById('otp-section')

    function showMessage(message, type) {
      otpMessage.textContent = message || ''
      otpMessage.className = type === 'success' ? 'msg-success' : 'msg-error'
    }

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault()
      loginError.textContent = ''
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const res = await api.login({ email, password })

      if (res?.success) {
        localStorage.setItem('token', res.data.token)
        localStorage.setItem('user', JSON.stringify(res.data.user))
        redirectToRoleDashboard(res.data.user)
        return
      }

      loginError.textContent = res?.message || 'Invalid email or password'
    })

    otpSendForm.addEventListener('submit', async (event) => {
      event.preventDefault()
      otpMessage.className = 'muted'
      otpMessage.textContent = ''
      const email = document.getElementById('otp-email').value.trim()
      const res = await api.sendOtp({ email })
      if (res?.success) {
        otpSection.classList.add('visible')
        if (res.data?.otp) {
          showMessage((res.data?.message || 'OTP generated') + ' OTP: ' + res.data.otp, 'success')
        } else {
          showMessage('OTP sent to ' + email, 'success')
        }
      } else {
        showMessage(res?.message || 'Failed to send OTP', 'error')
      }
    })

    otpVerifyForm.addEventListener('submit', async (event) => {
      event.preventDefault()
      otpMessage.className = 'muted'
      otpMessage.textContent = ''
      const email = document.getElementById('otp-email').value.trim()
      const otp = document.getElementById('otp-code').value.trim()
      const res = await api.verifyOtp({ email, otp })
      if (res?.success) {
        showMessage('OTP verified successfully! Redirecting...', 'success')
        setTimeout(() => {
          const user = JSON.parse(localStorage.getItem('user') || '{}')
          if (user.role === 'admin') {
            window.location.href = '/pages/dashboard-admin.html'
          } else {
            window.location.href = '/pages/dashboard-staff.html'
          }
        }, 1500)
      } else {
        showMessage(res?.message || 'Invalid OTP', 'error')
      }
    })
  </script>
</body>
</html>
