<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Receipts</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { api } from '/js/api.js'
    import { checkAuth } from '/js/auth.js'
    import { renderAppShell } from '/js/layout.js'

    const _token = localStorage.getItem('token')
    const _user = JSON.parse(localStorage.getItem('user') || '{}')
    if (!_token) window.location.href = '/pages/login.html'
    checkAuth()

    const page = renderAppShell({ title: 'Receipts', activeKey: 'operations' })
    page.innerHTML = `
      <section class="card">
        <form class="inline" id="receipt-form">
          <input id="supplier-name" placeholder="Supplier Name" required />
          <select id="receipt-product" required></select>
          <input id="receipt-qty" type="number" min="1" placeholder="Quantity" required />
          <button type="submit">Create Receipt</button>
        </form>
      </section>
      <section class="card">
        <form class="inline">
          <select id="status-filter">
            <option value="">All / Status</option>
            <option value="DRAFT">DRAFT</option>
            <option value="WAITING">WAITING</option>
            <option value="READY">READY</option>
            <option value="DONE">DONE</option>
            <option value="CANCELLED">CANCELLED</option>
          </select>
        </form>
      </section>
      <div id="error"></div>
      <div id="loading">Loading...</div>
      <section class="card" id="receipt-card" style="display:none;">
        <table>
          <thead><tr><th>Reference</th><th>Supplier</th><th>Status</th><th>Created By</th><th>Actions</th></tr></thead>
          <tbody id="receipt-body"></tbody>
        </table>
      </section>
    `

    const errorBox = document.getElementById('error')
    const loading = document.getElementById('loading')

    function showError(message) {
      errorBox.style.display = 'block'
      errorBox.textContent = message || 'Failed to load data. Please try again.'
    }

    async function loadProducts() {
      const res = await api.getProducts()
      if (!res?.success) return
      const select = document.getElementById('receipt-product')
      select.innerHTML = '<option value="">Select Product</option>'
      res.data.forEach((p) => {
        const option = document.createElement('option')
        option.value = p.id
        option.textContent = `${p.name} (${p.sku})`
        select.appendChild(option)
      })
    }

    function renderRows(rows) {
      const body = document.getElementById('receipt-body')
      body.innerHTML = ''
      rows.forEach((r) => {
        const tr = document.createElement('tr')
        tr.innerHTML = `<td>${r.reference || '-'}</td><td>${r.supplier_name || '-'}</td><td><span class="badge status-${r.status}">${r.status}</span></td><td>${r.created_by_name || '-'}</td><td><button data-validate="${r.id}">Validate</button> <button class="secondary" data-cancel="${r.id}">Cancel</button></td>`
        body.appendChild(tr)
      })
      document.getElementById('receipt-card').style.display = 'block'
    }

    async function loadReceipts(status = '') {
      loading.style.display = 'block'
      const res = await api.getReceipts(status)
      loading.style.display = 'none'
      if (!res?.success) {
        showError(res?.message)
        return
      }
      renderRows(res.data || [])
    }

    document.getElementById('status-filter').addEventListener('change', async (event) => {
      await loadReceipts(event.target.value)
    })

    document.getElementById('receipt-form').addEventListener('submit', async (event) => {
      event.preventDefault()
      const payload = {
        supplier_name: document.getElementById('supplier-name').value.trim(),
        items: [{ product_id: Number(document.getElementById('receipt-product').value), quantity: Number(document.getElementById('receipt-qty').value) }]
      }
      const res = await api.createReceipt(payload)
      if (!res?.success) {
        showError(res?.message || 'Failed to create receipt')
        return
      }
      event.target.reset()
      await loadReceipts(document.getElementById('status-filter').value)
    })

    document.getElementById('receipt-body').addEventListener('click', async (event) => {
      const validateId = event.target.getAttribute('data-validate')
      const cancelId = event.target.getAttribute('data-cancel')
      if (validateId) {
        const res = await api.validateReceipt(validateId)
        if (!res?.success) {
          showError(res?.message || 'Validation failed')
          return
        }
      }
      if (cancelId) {
        const res = await api.cancelReceipt(cancelId)
        if (!res?.success) {
          showError(res?.message || 'Cancel failed')
          return
        }
      }
      await loadReceipts(document.getElementById('status-filter').value)
    })

    await loadProducts()
    await loadReceipts()
  </script>
</body>
</html>
